name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9
        
    - name: Install Dependencies
      run: pnpm install --frozen-lockfile
      
    - name: Install Playwright Browsers
      run: pnpm dlx playwright install --with-deps chromium
      
    - name: Lint
      run: pnpm run lint
      
    - name: Typecheck
      run: pnpm --filter seeder exec tsc --noEmit
      
    - name: Build
      run: pnpm run build
      
    - name: Integration Tests
      run: pnpm run test
      
    - name: Benchmark (test-app only)
      run: pnpm dlx tsx apps/seeder/src/benchmark.ts
